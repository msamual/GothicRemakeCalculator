<div class="track-row">
  <div class="track-label">
    <span class="track-label__index">{{ plateIndex() }}</span>
    <span class="track-label__text">Пластина</span>
  </div>
  <div class="track-rail" role="group" [attr.aria-label]="'Пластина ' + plateIndex()">
    <span class="track-rail__line" aria-hidden="true"></span>
    @for (slot of slots; track slot) {
      <div
        class="track-slot"
        [class.track-slot--edge]="slot === 1 || slot === 7"
        [class.track-slot--goal]="slot === goalPosition"
        [class.track-slot--active]="slot === position()"
      >
        <span class="track-slot__number">{{ slot }}</span>
        @if (slot === position()) {
          <span class="track-marker" aria-hidden="true"></span>
        }
      </div>
    }
  </div>
</div>
