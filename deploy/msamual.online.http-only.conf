# HTTP-only bootstrap config (before certbot).
# install-nginx.sh uses this when Let's Encrypt certificates are not present yet.

server {
    listen 80;
    server_name msamual.online;

    location /GothicRemakeLockPuzzleCalculator/ {
        proxy_pass http://127.0.0.1:8080/GothicRemakeLockPuzzleCalculator/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /GothicRemakeLockPuzzleCalculator/index.html {
        proxy_pass http://127.0.0.1:8080/GothicRemakeLockPuzzleCalculator/index.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /GothicRemakeLockPuzzleCalculator {
        return 301 http://$host/GothicRemakeLockPuzzleCalculator/;
    }

    location = /favicon.ico {
        return 302 http://$host/GothicRemakeLockPuzzleCalculator/favicon.ico;
    }

    location = /favicon.svg {
        return 302 http://$host/GothicRemakeLockPuzzleCalculator/favicon.svg;
    }

    location / {
        return 404;
    }
}
