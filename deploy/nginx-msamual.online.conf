# Fragment for the main nginx on msamual.online (SSL already configured).
# Include inside the server { listen 443 ssl; server_name msamual.online; ... } block.

location /GothicRemakeLockPuzzleCalculator/ {
    proxy_pass http://127.0.0.1:8080/GothicRemakeLockPuzzleCalculator/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /GothicRemakeLockPuzzleCalculator {
    return 301 https://$host/GothicRemakeLockPuzzleCalculator/;
}
