# Production config with HTTPS (requires Let's Encrypt certificates).
# install-nginx.sh selects this automatically when certs exist on the server.

server {
    listen 80;
    server_name msamual.online;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name msamual.online;

    ssl_certificate /etc/letsencrypt/live/msamual.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msamual.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ~ ^/GothicReamakeLockPuzzleCalculator(/.*)?$ {
        return 301 https://$host/GothicRemakeLockPuzzleCalculator$1;
    }

    location /GothicRemakeLockPuzzleCalculator/ {
        proxy_pass http://127.0.0.1:8080/GothicRemakeLockPuzzleCalculator/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /GothicRemakeLockPuzzleCalculator/index.html {
        proxy_pass http://127.0.0.1:8080/GothicRemakeLockPuzzleCalculator/index.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /GothicRemakeLockPuzzleCalculator {
        return 301 https://$host/GothicRemakeLockPuzzleCalculator/;
    }

    location = /favicon.ico {
        return 302 https://$host/GothicRemakeLockPuzzleCalculator/favicon.ico;
    }

    location = /favicon.svg {
        return 302 https://$host/GothicRemakeLockPuzzleCalculator/favicon.svg;
    }

    location / {
        return 404;
    }
}
