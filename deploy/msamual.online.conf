# Full nginx site config for msamual.online
# Install on server:
#   sudo cp deploy/msamual.online.conf /etc/nginx/sites-available/msamual.online
#   sudo ln -sf /etc/nginx/sites-available/msamual.online /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # if default page conflicts
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (after HTTP works):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d msamual.online

server {
    listen 80;
    server_name msamual.online;

    location /GothicReamakeLockPuzzleCalculator/ {
        proxy_pass http://127.0.0.1:8080/GothicReamakeLockPuzzleCalculator/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /GothicReamakeLockPuzzleCalculator/index.html {
        proxy_pass http://127.0.0.1:8080/GothicReamakeLockPuzzleCalculator/index.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /GothicReamakeLockPuzzleCalculator {
        return 301 http://$host/GothicReamakeLockPuzzleCalculator/;
    }

    location = /favicon.ico {
        return 302 http://$host/GothicReamakeLockPuzzleCalculator/favicon.ico;
    }

    location = /favicon.svg {
        return 302 http://$host/GothicReamakeLockPuzzleCalculator/favicon.svg;
    }

    location / {
        return 404;
    }
}

