name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy application
        working-directory: ${{ github.workspace }}
        env:
          COMPOSE_PROJECT_NAME: gothiclock
          APP_PORT: "8080"
          BASE_PATH: GothicReamakeLockPuzzleCalculator
        run: |
          chmod +x deploy.sh deploy/install-nginx.sh
          ./deploy.sh
