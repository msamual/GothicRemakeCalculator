name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Docker Compose
        run: |
          if docker compose version &>/dev/null 2>&1; then
            echo "Docker Compose v2: $(docker compose version)"
          elif command -v docker-compose &>/dev/null; then
            echo "WARNING: only docker-compose v1 found ($(docker-compose --version))."
            echo "deploy.sh will remove containers via docker rm before up."
            echo "To install v2 on the server (one-time, requires sudo): sudo apt install docker-compose-plugin"
          else
            echo "ERROR: neither 'docker compose' nor 'docker-compose' is available."
            exit 1
          fi

      - name: Deploy application
        working-directory: ${{ github.workspace }}
        env:
          COMPOSE_PROJECT_NAME: gothiclock
          APP_PORT: "8080"
          BASE_PATH: GothicReamakeLockPuzzleCalculator
        run: |
          chmod +x deploy.sh deploy/install-nginx.sh
          ./deploy.sh
